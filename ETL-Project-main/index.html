<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Práctica 3 - Consumo de Usuarios</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Ejercicio de Promesas</p>
        <h1>Usuarios desde una API pública</h1>
        <p class="lede">
          Usa el botón para cargar la lista de usuarios y filtra por nombre en
          tiempo real. Mientras la petición se resuelve, verás un indicador de
          carga.
        </p>
      </header>

      <div class="controls">
        <input
          type="search"
          id="searchInput"
          placeholder="Buscar por nombre"
          autocomplete="off"
        />
        <button id="loadButton" type="button">Cargar Usuarios</button>
      </div>

      <div id="loader" class="loader" aria-live="polite" hidden>
        <span class="spinner"></span>
        <span>Cargando usuarios…</span>
      </div>

      <section id="userGrid" class="user-grid" aria-live="polite"></section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
